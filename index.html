<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الخصومات الاحترافية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="calculator-card">
        <h2><span class="icon">💸</span> حاسبة الخصم الذكية</h2>
        
        <div class="input-group">
            <label>سعر الجهاز (جنيه)</label>
            <input type="number" id="price" placeholder="مثلاً: 17000" step="any">
        </div>

        <div class="input-group">
            <label>نسبة الخصم (%)</label>
            <input type="number" id="discount" placeholder="مثلاً: 25" step="any">
        </div>

        <button onclick="calculateDiscount()">احسب السعر النهائي</button>

        <div class="results" id="resultBox">
            <div class="result-item">
                <span>قيمة الخصم:</span>
                <span id="savedAmount">0 جنيه</span>
            </div>
            <hr>
            <div class="result-item total">
                <span>السعر بعد الخصم:</span>
                <span id="finalPrice">0 جنيه</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
