<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الخصم الاحترافية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="calculator-card">
        <h2><span class="icon">💰</span> حاسبة الخصم</h2>
        
        <div class="input-group">
            <label for="price">السعر الأصلي (جنيه)</label>
            <input type="number" id="price" placeholder="أدخل المبلغ هنا" required>
        </div>

        <div class="input-group">
            <label for="discount">نسبة الخصم (%)</label>
            <input type="number" id="discount" placeholder="مثلاً 25" required>
        </div>

        <button id="calculateBtn">احسب الآن</button>

        <div class="results" id="resultBox">
            <div class="result-line">
                <span>وفرت مبلغ:</span>
                <strong id="savedAmount">0</strong>
            </div>
            <div class="result-line total">
                <span>السعر النهائي:</span>
                <strong id="finalPrice">0</strong>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
